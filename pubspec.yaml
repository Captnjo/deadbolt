name: deadbolt
description: "Deadbolt — Solana wallet with hardware signer support."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  window_manager: ^0.3.9
  flutter_rust_bridge: 2.11.1
  http: ^1.2.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.0
  rust_lib_deadbolt:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/tokens.json
    - assets/deadbolt_logomark.png
